  <script>
    document.querySelector('.form-card').addEventListener('submit', function () {
      document.getElementById('submitBtn').disabled = true;
      document.getElementById('loading-overlay').classList.add('active');
    });

    (function () {
      var UNIVERSITY_GROUPS = ['קבוצת לימוד א', 'קבוצת לימוד ב', 'קבוצת לימוד ג', 'קורס כללי'];

      function applyInstitutionType(type) {
        if (type !== 'university') return;
        var gradeGroup = document.getElementById('quizGrade').closest('.form-group');
        var gradeSelect = document.getElementById('quizGrade');
        var classSelect = document.getElementById('quizClass');
        var classLabel = classSelect.closest('.form-group').querySelector('label');

        gradeGroup.style.display = 'none';
        gradeSelect.removeAttribute('required');
        gradeSelect.innerHTML = '<option value="אקדמי" selected>אקדמי</option>';

        classSelect.innerHTML = '<option value="">בחרי קבוצה</option>';
        UNIVERSITY_GROUPS.forEach(function (g) {
          var opt = document.createElement('option');
          opt.value = g;
          opt.textContent = g;
          classSelect.appendChild(opt);
        });
        if (classLabel) classLabel.textContent = 'קבוצת לימוד / קורס';
      }

      fetch('php/get_settings.php')
        .then(function (r) { return r.json(); })
        .then(function (d) { applyInstitutionType(d.institution_type); })
        .catch(function () { /* default: keep school dropdowns */ });
    })();
  </script>
